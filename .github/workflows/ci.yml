name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        dotnet-quality: 'preview'

    - name: Restore dependencies
      run: dotnet restore Alarm112.sln

    - name: Build
      run: dotnet build Alarm112.sln --no-restore -c Release

    - name: Run tests
      run: |
        dotnet test Alarm112.sln --no-build -c Release \
          --logger "trx;LogFileName=test-results.trx" \
          --collect:"XPlat Code Coverage" \
          --results-directory ./coverage

    - name: Validate content bundles
      run: pwsh tools/content-verify.ps1
      shell: pwsh

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: '**/test-results.trx'

    - name: Upload coverage
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage
        path: coverage/**/coverage.cobertura.xml

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build API image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: src/Alarm112.Api/Dockerfile
        push: false
        tags: alarm112-api:ci
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build AdminWeb image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: src/Alarm112.AdminWeb/Dockerfile
        push: false
        tags: alarm112-adminweb:ci
        cache-from: type=gha
        cache-to: type=gha,mode=max

  e2e-api:
    runs-on: ubuntu-latest
    needs: build-and-test
    env:
      Security__Jwt__SigningKey: "ci-test-key-exactly-32-chars-min!!"
      AdminAuth__Username: "ci-admin"
      AdminAuth__Password: "ci-admin-test-pass-secure"

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        dotnet-quality: 'preview'

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Start API
      run: dotnet run --project src/Alarm112.Api --configuration Release &
      env:
        ASPNETCORE_URLS: "http://localhost:5080"

    - name: Install Playwright
      working-directory: tests/e2e
      run: npm ci && npx playwright install --with-deps chromium

    - name: Wait for API to be healthy
      run: |
        for i in {1..30}; do
          curl -sf http://localhost:5080/health && echo "API ready" && break || sleep 2
        done

    - name: Run E2E tests (API)
      working-directory: tests/e2e
      run: npx playwright test tests/api/
      env:
        API_BASE: "http://localhost:5080"

    - name: Upload E2E results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: e2e-api-results
        path: artifacts/e2e/

  e2e-admin:
    runs-on: ubuntu-latest
    needs: build-and-test
    env:
      AdminAuth__Username: "ci-admin"
      AdminAuth__Password: "ci-admin-test-pass-secure"

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        dotnet-quality: 'preview'

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Start AdminWeb
      run: dotnet run --project src/Alarm112.AdminWeb --configuration Release &
      env:
        ASPNETCORE_URLS: "http://localhost:5081"

    - name: Install Playwright
      working-directory: tests/e2e
      run: npm ci && npx playwright install --with-deps chromium

    - name: Wait for AdminWeb to be healthy
      run: |
        for i in {1..30}; do
          curl -sf http://localhost:5081/health && echo "AdminWeb ready" && break || sleep 2
        done

    - name: Run E2E tests (Admin)
      working-directory: tests/e2e
      run: npx playwright test tests/admin/
      env:
        ADMIN_BASE: "http://localhost:5081"
        ADMIN_USERNAME: "ci-admin"
        ADMIN_PASSWORD: "ci-admin-test-pass-secure"

    - name: Upload Admin E2E results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: e2e-admin-results
        path: artifacts/e2e/

