name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        dotnet-quality: 'preview'

    - name: Restore dependencies
      run: dotnet restore Alarm112.sln

    - name: Build
      run: dotnet build Alarm112.sln --no-restore -c Release

    - name: Run tests
      run: dotnet test Alarm112.sln --no-build -c Release --logger "trx;LogFileName=test-results.trx"

    - name: Validate content bundles
      run: pwsh tools/content-verify.ps1
      shell: pwsh

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: '**/test-results.trx'

  e2e:
    runs-on: ubuntu-latest
    needs: build-and-test
    env:
      Security__Jwt__SigningKey: "ci-test-key-exactly-32-chars-min!!"
      AdminAuth__Password: "ci-admin-test-pass"

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        dotnet-quality: 'preview'

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Start API
      run: dotnet run --project src/Alarm112.Api --configuration Release &
      env:
        ASPNETCORE_URLS: "http://localhost:5080"

    - name: Install Playwright
      working-directory: tests/e2e
      run: npm ci && npx playwright install --with-deps chromium

    - name: Wait for API
      run: |
        for i in {1..30}; do
          curl -sf http://localhost:5080/health && break || sleep 2
        done

    - name: Run E2E tests (API)
      working-directory: tests/e2e
      run: npx playwright test tests/api/
      env:
        API_BASE: "http://localhost:5080"

    - name: Upload E2E results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: e2e-results
        path: artifacts/e2e/
