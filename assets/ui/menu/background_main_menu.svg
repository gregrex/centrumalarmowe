<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <!-- nocne niebo -->
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#01040d"/>
      <stop offset="60%"  stop-color="#040d1f"/>
      <stop offset="100%" stop-color="#0a1432"/>
    </linearGradient>
    <!-- ziemia / ulica -->
    <linearGradient id="ground" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d1524"/>
      <stop offset="100%" stop-color="#060c18"/>
    </linearGradient>
    <!-- glow syreny niebieski -->
    <radialGradient id="siren-blue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity=".9"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <!-- glow syreny czerwony -->
    <radialGradient id="siren-red" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity=".8"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
    <filter id="city-glow">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── NIEBO ─────────────────────────────────────────── -->
  <rect width="1024" height="1024" fill="url(#sky)"/>

  <!-- gwiazdy -->
  <g fill="rgba(255,255,255,0.6)">
    <circle cx="80"  cy="60"  r="1.2"/><circle cx="200" cy="40"  r="0.8"/>
    <circle cx="340" cy="80"  r="1.0"/><circle cx="450" cy="30"  r="1.4"/>
    <circle cx="600" cy="55"  r="0.9"/><circle cx="750" cy="45"  r="1.1"/>
    <circle cx="900" cy="70"  r="0.7"/><circle cx="960" cy="35"  r="1.3"/>
    <circle cx="130" cy="130" r="0.6"/><circle cx="280" cy="110" r="0.9"/>
    <circle cx="510" cy="110" r="0.7"/><circle cx="820" cy="100" r="1.0"/>
  </g>

  <!-- ── SYLWETKA MIASTA ────────────────────────────────── -->
  <!-- budynki tła (ciemniejsze) -->
  <g fill="#070e1c">
    <rect x="0"   y="460" width="120" height="340"/>
    <rect x="100" y="380" width="80"  height="420"/>
    <rect x="170" y="420" width="60"  height="380"/>
    <rect x="220" y="350" width="100" height="450"/>
    <rect x="310" y="410" width="70"  height="390"/>
    <rect x="370" y="340" width="110" height="460"/>
    <rect x="470" y="400" width="80"  height="400"/>
    <rect x="540" y="360" width="90"  height="440"/>
    <rect x="620" y="380" width="100" height="420"/>
    <rect x="710" y="340" width="80"  height="460"/>
    <rect x="780" y="420" width="70"  height="380"/>
    <rect x="840" y="370" width="100" height="430"/>
    <rect x="930" y="410" width="94"  height="390"/>
  </g>

  <!-- budynki pierwszego planu -->
  <g fill="#0a1425">
    <rect x="0"   y="520" width="90"  height="280"/>
    <rect x="80"  y="460" width="70"  height="340"/>
    <rect x="140" y="500" width="85"  height="300"/>
    <rect x="215" y="440" width="90"  height="360"/>
    <rect x="295" y="470" width="75"  height="330"/>
    <rect x="360" y="430" width="100" height="370"/>
    <rect x="450" y="490" width="80"  height="310"/>
    <rect x="520" y="450" width="95"  height="350"/>
    <rect x="605" y="470" width="85"  height="330"/>
    <rect x="680" y="430" width="100" height="370"/>
    <rect x="770" y="480" width="80"  height="320"/>
    <rect x="840" y="450" width="90"  height="350"/>
    <rect x="920" y="500" width="104" height="300"/>
  </g>

  <!-- okna biur (jasne punkciki) -->
  <g fill="#fef3c7" opacity=".35">
    <!-- blok lewy -->
    <rect x="90"  y="468" width="4" height="5" rx="1"/>
    <rect x="98"  y="468" width="4" height="5" rx="1"/>
    <rect x="90"  y="480" width="4" height="5" rx="1"/>
    <rect x="106" y="476" width="4" height="5" rx="1"/>
    <!-- blok środkowy -->
    <rect x="380" y="440" width="5" height="6" rx="1"/>
    <rect x="392" y="440" width="5" height="6" rx="1"/>
    <rect x="380" y="454" width="5" height="6" rx="1"/>
    <rect x="404" y="448" width="5" height="6" rx="1"/>
    <rect x="416" y="448" width="5" height="6" rx="1"/>
    <!-- blok prawy -->
    <rect x="700" y="444" width="4" height="6" rx="1"/>
    <rect x="712" y="444" width="4" height="6" rx="1"/>
    <rect x="724" y="444" width="4" height="6" rx="1"/>
    <rect x="700" y="458" width="4" height="6" rx="1"/>
    <rect x="712" y="462" width="4" height="6" rx="1"/>
  </g>
  <!-- okna z niebieskawym poświatą (biurowe w nocy) -->
  <g fill="#bfdbfe" opacity=".18">
    <rect x="230" y="456" width="6" height="8" rx="1"/>
    <rect x="244" y="456" width="6" height="8" rx="1"/>
    <rect x="258" y="464" width="6" height="8" rx="1"/>
    <rect x="550" y="462" width="6" height="8" rx="1"/>
    <rect x="564" y="462" width="6" height="8" rx="1"/>
    <rect x="860" y="458" width="6" height="8" rx="1"/>
    <rect x="876" y="464" width="6" height="8" rx="1"/>
  </g>

  <!-- ── DROGA / ULICA ─────────────────────────────────── -->
  <rect x="0" y="780" width="1024" height="244" fill="url(#ground)"/>
  <!-- linia środkowa -->
  <g stroke="#1e3a5f" stroke-width="3" stroke-dasharray="60 40">
    <line x1="0" y1="840" x2="1024" y2="840"/>
    <line x1="0" y1="900" x2="1024" y2="900"/>
  </g>
  <!-- chodnik -->
  <rect x="0" y="780" width="1024" height="12" fill="#111c2e"/>
  <!-- latarnie uliczne -->
  <g fill="#1e3a5f" stroke="#38bdf8" stroke-width="1">
    <line x1="150" y1="780" x2="150" y2="720" stroke-width="3" stroke="#1e3a5f"/>
    <circle cx="150" cy="718" r="8" fill="#fef3c7" opacity=".7" filter="url(#city-glow)"/>
    <line x1="400" y1="780" x2="400" y2="700" stroke-width="3" stroke="#1e3a5f"/>
    <circle cx="400" cy="698" r="8" fill="#fef3c7" opacity=".6" filter="url(#city-glow)"/>
    <line x1="650" y1="780" x2="650" y2="720" stroke-width="3" stroke="#1e3a5f"/>
    <circle cx="650" cy="718" r="8" fill="#fef3c7" opacity=".65" filter="url(#city-glow)"/>
    <line x1="900" y1="780" x2="900" y2="700" stroke-width="3" stroke="#1e3a5f"/>
    <circle cx="900" cy="698" r="8" fill="#fef3c7" opacity=".7" filter="url(#city-glow)"/>
  </g>

  <!-- ── GLOW SYRENY – NIEBIESKIE I CZERWONE ───────────── -->
  <circle cx="240" cy="790" r="90" fill="url(#siren-blue)" opacity=".55" filter="url(#soft-glow)"/>
  <circle cx="760" cy="810" r="80" fill="url(#siren-red)"  opacity=".45" filter="url(#soft-glow)"/>
  <circle cx="510" cy="800" r="70" fill="url(#siren-blue)" opacity=".35" filter="url(#soft-glow)"/>

  <!-- ── ZNAKI 112 – duże logo ──────────────────────────── -->
  <text x="512" y="680" font-size="110" font-weight="900" font-family="Arial Black, Arial" fill="#ff4b1f"
        text-anchor="middle" opacity=".92" filter="url(#soft-glow)">112</text>
  <text x="512" y="750" font-size="28" font-weight="600" font-family="Arial" fill="#d8e0ec"
        text-anchor="middle" opacity=".55" letter-spacing="8">CENTRUM ALARMOWE</text>

  <!-- ── VIGNETTE ─────────────────────────────────────── -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="0%" stop-color="transparent"/>
    <stop offset="100%" stop-color="rgba(0,0,0,0.65)"/>
  </radialGradient>
  <rect width="1024" height="1024" fill="url(#vignette)"/>
</svg>