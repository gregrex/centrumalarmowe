<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- scene_report_room.svg — post-round report room, stars, rewards -->
  <defs>
    <linearGradient id="bg-rr" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#020408"/>
      <stop offset="100%" stop-color="#06091a"/>
    </linearGradient>
    <linearGradient id="podium-gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
    <radialGradient id="spotlight-rr" cx="50%" cy="0%" r="60%">
      <stop offset="0%" stop-color="rgba(251,191,36,0.15)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="glow-rr">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-rr-sm">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="vignette-rr" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.6)"/>
    </radialGradient>
  </defs>

  <!-- BASE -->
  <rect width="1024" height="1024" fill="url(#bg-rr)"/>
  <rect width="1024" height="1024" fill="url(#spotlight-rr)"/>

  <!-- grid -->
  <g stroke="rgba(251,191,36,0.04)" stroke-width="1">
    <line x1="0"   y1="256"  x2="1024" y2="256"/>
    <line x1="0"   y1="512"  x2="1024" y2="512"/>
    <line x1="0"   y1="768"  x2="1024" y2="768"/>
    <line x1="256" y1="0"    x2="256"  y2="1024"/>
    <line x1="512" y1="0"    x2="512"  y2="1024"/>
    <line x1="768" y1="0"    x2="768"  y2="1024"/>
  </g>

  <!-- ── TYTUŁ ─────────────────────────────────────────── -->
  <text x="512" y="80" font-size="54" font-weight="900" font-family="Arial Black, Arial"
        fill="#fbbf24" text-anchor="middle" letter-spacing="4" filter="url(#glow-rr)">RAPORT DYŻURU</text>
  <text x="512" y="118" font-size="22" font-family="Arial" fill="rgba(251,191,36,0.5)"
        text-anchor="middle" letter-spacing="3">DEMO SHIFT · MISJA ZAKOŃCZONA</text>

  <!-- ── OCENA (duże gwiazdki) ──────────────────────────── -->
  <!-- gwiazda 1 (złota) -->
  <g transform="translate(362,150)">
    <polygon points="40,4 49,32 78,32 55,50 63,78 40,60 17,78 25,50 2,32 31,32"
             fill="#fbbf24" stroke="#f59e0b" stroke-width="1.5" filter="url(#glow-rr)"/>
  </g>
  <!-- gwiazda 2 (złota) -->
  <g transform="translate(472,150)">
    <polygon points="40,4 49,32 78,32 55,50 63,78 40,60 17,78 25,50 2,32 31,32"
             fill="#fbbf24" stroke="#f59e0b" stroke-width="1.5" filter="url(#glow-rr)"/>
  </g>
  <!-- gwiazda 3 (pusta — nie zdobyta) -->
  <g transform="translate(582,150)" opacity="0.35">
    <polygon points="40,4 49,32 78,32 55,50 63,78 40,60 17,78 25,50 2,32 31,32"
             fill="#1a1a1a" stroke="#92400e" stroke-width="2"/>
  </g>
  <!-- ocena literowa -->
  <text x="512" y="280" font-size="96" font-weight="900" font-family="Arial Black, Arial"
        fill="#fbbf24" text-anchor="middle" filter="url(#glow-rr)">A</text>

  <!-- ── STATYSTYKI ─────────────────────────────────────── -->
  <rect x="80" y="340" width="864" height="260" rx="20" fill="rgba(6,10,18,0.85)"
        stroke="rgba(251,191,36,0.15)" stroke-width="1.5"/>

  <!-- wiersz: Incydenty obsłużone -->
  <text x="120" y="390" font-size="22" font-family="Arial" fill="#8b96a8">Incydenty obsłużone</text>
  <text x="900" y="390" font-size="26" font-weight="700" font-family="Arial" fill="#d8e0ec" text-anchor="end">14 / 16</text>
  <rect x="120" y="400" width="760" height="8" rx="4" fill="rgba(255,255,255,0.08)"/>
  <rect x="120" y="400" width="665" height="8" rx="4" fill="#4ade80" filter="url(#glow-rr-sm)"/>

  <!-- wiersz: Czas reakcji -->
  <text x="120" y="448" font-size="22" font-family="Arial" fill="#8b96a8">Średni czas reakcji</text>
  <text x="900" y="448" font-size="26" font-weight="700" font-family="Arial" fill="#fbbf24" text-anchor="end">3:24 min</text>
  <rect x="120" y="458" width="760" height="8" rx="4" fill="rgba(255,255,255,0.08)"/>
  <rect x="120" y="458" width="500" height="8" rx="4" fill="#fbbf24" filter="url(#glow-rr-sm)"/>

  <!-- wiersz: Ofiary -->
  <text x="120" y="506" font-size="22" font-family="Arial" fill="#8b96a8">Ofiary uniknięte</text>
  <text x="900" y="506" font-size="26" font-weight="700" font-family="Arial" fill="#38bdf8" text-anchor="end">8 / 8</text>
  <rect x="120" y="516" width="760" height="8" rx="4" fill="rgba(255,255,255,0.08)"/>
  <rect x="120" y="516" width="760" height="8" rx="4" fill="#38bdf8" filter="url(#glow-rr-sm)"/>

  <!-- wiersz: Współpraca -->
  <text x="120" y="564" font-size="22" font-family="Arial" fill="#8b96a8">Wynik współpracy</text>
  <text x="900" y="564" font-size="26" font-weight="700" font-family="Arial" fill="#a78bfa" text-anchor="end">88 pkt</text>
  <rect x="120" y="574" width="760" height="8" rx="4" fill="rgba(255,255,255,0.08)"/>
  <rect x="120" y="574" width="630" height="8" rx="4" fill="#a78bfa" filter="url(#glow-rr-sm)"/>

  <!-- ── NAGRODY ──────────────────────────────────────────── -->
  <text x="512" y="650" font-size="28" font-weight="700" font-family="Arial"
        fill="#fbbf24" text-anchor="middle" letter-spacing="3">NAGRODY</text>

  <!-- nagroda 1: XP -->
  <rect x="80" y="668" width="256" height="96" rx="14" fill="rgba(251,191,36,0.1)"
        stroke="rgba(251,191,36,0.3)" stroke-width="1.5" filter="url(#glow-rr-sm)"/>
  <text x="208" y="710" font-size="36" text-anchor="middle">🏅</text>
  <text x="208" y="744" font-size="18" font-weight="600" font-family="Arial" fill="#fbbf24" text-anchor="middle">+1200 XP</text>

  <!-- nagroda 2: Odznaka -->
  <rect x="384" y="668" width="256" height="96" rx="14" fill="rgba(56,189,248,0.1)"
        stroke="rgba(56,189,248,0.25)" stroke-width="1.5" filter="url(#glow-rr-sm)"/>
  <text x="512" y="710" font-size="36" text-anchor="middle">🎖️</text>
  <text x="512" y="744" font-size="18" font-weight="600" font-family="Arial" fill="#38bdf8" text-anchor="middle">Odznaka: Strażak</text>

  <!-- nagroda 3: Odblokowanie -->
  <rect x="688" y="668" width="256" height="96" rx="14" fill="rgba(74,222,128,0.1)"
        stroke="rgba(74,222,128,0.25)" stroke-width="1.5" filter="url(#glow-rr-sm)"/>
  <text x="816" y="710" font-size="36" text-anchor="middle">🔓</text>
  <text x="816" y="744" font-size="18" font-weight="600" font-family="Arial" fill="#4ade80" text-anchor="middle">Rozdział 2</text>

  <!-- ── WYNIK CAŁKOWITY ─────────────────────────────────── -->
  <rect x="80" y="800" width="864" height="90" rx="18" fill="rgba(251,191,36,0.12)"
        stroke="rgba(251,191,36,0.35)" stroke-width="2.5" filter="url(#glow-rr-sm)"/>
  <text x="260" y="854" font-size="30" font-weight="700" font-family="Arial" fill="#fbbf24">WYNIK CAŁKOWITY</text>
  <text x="900" y="857" font-size="48" font-weight="900" font-family="Arial" fill="#fbbf24" text-anchor="end" filter="url(#glow-rr)">9840 PKT</text>

  <!-- ── PRZYCISK DALEJ ───────────────────────────────────── -->
  <rect x="312" y="920" width="400" height="80" rx="16" fill="#fbbf24" stroke="#f59e0b" stroke-width="2" filter="url(#glow-rr)"/>
  <text x="512" y="970" font-size="30" font-weight="800" font-family="Arial"
        fill="#03060e" text-anchor="middle" letter-spacing="3">KONTYNUUJ →</text>

  <!-- VIGNETTE -->
  <rect width="1024" height="1024" fill="url(#vignette-rr)" pointer-events="none"/>
</svg>
