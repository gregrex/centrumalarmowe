<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320">
  <!-- Incident Card Template — 880×320px -->
  <!-- Usage: instantiate per incident; swap color class via role/priority -->
  <defs>
    <filter id="glow-ic">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-ic-sm">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── CRITICAL VARIANT (top example) ───────────────────────── -->
  <g transform="translate(0,0)">
    <rect x="2" y="2" width="876" height="140" rx="16" fill="rgba(127,29,29,0.4)"
          stroke="#ef4444" stroke-width="2" filter="url(#glow-ic-sm)"/>
    <!-- priority bar (left edge) -->
    <rect x="2" y="2" width="8" height="140" rx="4" fill="#ef4444" filter="url(#glow-ic)"/>
    <!-- category icon area -->
    <rect x="18" y="12" width="56" height="56" rx="10" fill="rgba(239,68,68,0.2)" stroke="rgba(239,68,68,0.4)" stroke-width="1.5"/>
    <!-- fire icon placeholder -->
    <text x="46" y="50" font-size="32" text-anchor="middle">🔥</text>

    <!-- title -->
    <text x="92" y="38" font-size="22" font-weight="800" font-family="Arial" fill="#fca5a5">Pożar Budynku</text>
    <!-- priority badge -->
    <rect x="440" y="16" width="120" height="28" rx="6" fill="#7f1d1d" stroke="#ef4444" stroke-width="1.5"/>
    <text x="500" y="34" font-size="14" font-weight="700" font-family="Arial" fill="#fca5a5" text-anchor="middle">⚠ KRYTYCZNY</text>
    <!-- ID badge -->
    <rect x="576" y="16" width="72" height="28" rx="6" fill="rgba(255,255,255,0.08)"/>
    <text x="612" y="34" font-size="14" font-family="Arial" fill="#6b7280" text-anchor="middle">#INC-001</text>

    <!-- location -->
    <text x="92" y="64" font-size="17" font-family="Arial" fill="#94a3b8">📍 ul. Żelazna 14, Centrum</text>
    <!-- time elapsed -->
    <text x="660" y="64" font-size="17" font-family="Arial" fill="#94a3b8" text-anchor="end">⏱ 00:04:32</text>

    <!-- units row -->
    <text x="92" y="92" font-size="15" font-family="Arial" fill="#64748b">Wymagane:</text>
    <!-- unit chips -->
    <rect x="200" y="76" width="90" height="26" rx="6" fill="rgba(239,68,68,0.2)" stroke="rgba(239,68,68,0.4)" stroke-width="1"/>
    <text x="245" y="94" font-size="13" font-weight="600" font-family="Arial" fill="#fca5a5" text-anchor="middle">🚒 Straż ×2</text>
    <rect x="300" y="76" width="90" height="26" rx="6" fill="rgba(56,189,248,0.15)" stroke="rgba(56,189,248,0.3)" stroke-width="1"/>
    <text x="345" y="94" font-size="13" font-weight="600" font-family="Arial" fill="#7dd3fc" text-anchor="middle">🚑 Pogotowie ×1</text>

    <!-- action button -->
    <rect x="700" y="80" width="164" height="48" rx="12" fill="#7f1d1d" stroke="#ef4444" stroke-width="2" filter="url(#glow-ic-sm)"/>
    <text x="782" y="110" font-size="18" font-weight="700" font-family="Arial" fill="#fca5a5" text-anchor="middle">DYSPONUJ →</text>

    <!-- ETA -->
    <text x="92" y="128" font-size="14" font-family="Arial" fill="#4b5563">Szacowany czas dojazdu: <tspan fill="#fbbf24" font-weight="700">6 min</tspan></text>
    <!-- reporter -->
    <text x="660" y="128" font-size="14" font-family="Arial" fill="#4b5563" text-anchor="end">Zgłaszający: Jan K. (tel. 112)</text>
  </g>

  <!-- ── STANDARD VARIANT (bottom example) ─────────────────────── -->
  <g transform="translate(0,160)">
    <rect x="2" y="2" width="876" height="140" rx="16" fill="rgba(13,26,45,0.6)"
          stroke="rgba(56,189,248,0.3)" stroke-width="1.5"/>
    <rect x="2" y="2" width="8" height="140" rx="4" fill="#38bdf8"/>
    <rect x="18" y="12" width="56" height="56" rx="10" fill="rgba(56,189,248,0.1)" stroke="rgba(56,189,248,0.3)" stroke-width="1.5"/>
    <text x="46" y="50" font-size="32" text-anchor="middle">🚗</text>
    <text x="92" y="38" font-size="22" font-weight="800" font-family="Arial" fill="#7dd3fc">Wypadek Drogowy</text>
    <rect x="440" y="16" width="100" height="28" rx="6" fill="rgba(56,189,248,0.15)" stroke="rgba(56,189,248,0.3)" stroke-width="1"/>
    <text x="490" y="34" font-size="14" font-weight="700" font-family="Arial" fill="#7dd3fc" text-anchor="middle">WYSOKI</text>
    <rect x="556" y="16" width="72" height="28" rx="6" fill="rgba(255,255,255,0.05)"/>
    <text x="592" y="34" font-size="14" font-family="Arial" fill="#6b7280" text-anchor="middle">#INC-002</text>
    <text x="92" y="64" font-size="17" font-family="Arial" fill="#94a3b8">📍 ul. Marszałkowska 88, Śródmieście</text>
    <text x="660" y="64" font-size="17" font-family="Arial" fill="#94a3b8" text-anchor="end">⏱ 00:01:15</text>
    <text x="92" y="92" font-size="15" font-family="Arial" fill="#64748b">Wymagane:</text>
    <rect x="200" y="76" width="90" height="26" rx="6" fill="rgba(56,189,248,0.1)" stroke="rgba(56,189,248,0.3)" stroke-width="1"/>
    <text x="245" y="94" font-size="13" font-weight="600" font-family="Arial" fill="#7dd3fc" text-anchor="middle">🚑 Pogotowie ×1</text>
    <rect x="700" y="80" width="164" height="48" rx="12" fill="#1e3a5f" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="782" y="110" font-size="18" font-weight="700" font-family="Arial" fill="#38bdf8" text-anchor="middle">DYSPONUJ →</text>
    <text x="92" y="128" font-size="14" font-family="Arial" fill="#4b5563">Szacowany czas dojazdu: <tspan fill="#fbbf24" font-weight="700">4 min</tspan></text>
    <text x="660" y="128" font-size="14" font-family="Arial" fill="#4b5563" text-anchor="end">Zgłaszający: Dispatcher auto-wykrycie</text>
  </g>
</svg>
