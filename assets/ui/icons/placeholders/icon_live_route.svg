<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96">
  <defs>
    <filter id="glow-lr">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="2" y="2" width="92" height="92" rx="18" fill="#020c14" stroke="#22d3ee" stroke-width="2"/>
  <!-- tło mapy mini -->
  <g stroke="rgba(34,211,238,0.10)" stroke-width="1">
    <line x1="0"  y1="36" x2="96" y2="36"/>
    <line x1="0"  y1="60" x2="96" y2="60"/>
    <line x1="36" y1="0"  x2="36" y2="96"/>
    <line x1="60" y1="0"  x2="60" y2="96"/>
  </g>
  <!-- trasa aktywna – świecąca linia ciągła -->
  <path d="M14 78 C20 60 36 50 48 44 C60 38 72 30 82 18"
        fill="none" stroke="#22d3ee" stroke-width="4"
        stroke-linecap="round" filter="url(#glow-lr)"/>
  <!-- trail effect – ciemniejsza linia tła -->
  <path d="M14 78 C20 60 36 50 48 44 C60 38 72 30 82 18"
        fill="none" stroke="#0891b2" stroke-width="8" stroke-linecap="round" opacity=".25"/>
  <!-- ikona pojazdu (trójkąt kierunkowy) na trasie -->
  <circle cx="48" cy="44" r="7" fill="#22d3ee" filter="url(#glow-lr)" opacity=".9"/>
  <circle cx="48" cy="44" r="3.5" fill="#fff"/>
  <!-- znacznik celu -->
  <circle cx="82" cy="18" r="8" fill="#1c0800" stroke="#f97316" stroke-width="2" filter="url(#glow-lr)"/>
  <circle cx="82" cy="22" r="8" fill="#1c0800"/>
  <path d="M82 10 C77 10 74 14 74 18 C74 24 82 32 82 32 C82 32 90 24 90 18 C90 14 87 10 82 10Z" fill="#f97316"/>
  <circle cx="82" cy="18" r="3" fill="#fff" opacity=".9"/>
  <!-- ETA label -->
  <rect x="4" y="6" width="38" height="16" rx="4" fill="rgba(34,211,238,0.12)" stroke="rgba(34,211,238,0.3)" stroke-width="1"/>
  <text x="23" y="17" font-size="8" font-weight="700" font-family="Arial" fill="#22d3ee" text-anchor="middle">ETA 3:40</text>
</svg>
