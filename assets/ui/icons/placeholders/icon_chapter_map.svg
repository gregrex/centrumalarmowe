<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <filter id="glow-cm">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="128" height="128" rx="16" fill="#030710"/>
  <rect x="1" y="1" width="126" height="126" rx="15" fill="none" stroke="rgba(56,189,248,0.2)" stroke-width="1"/>

  <!-- tło mapy — siatka ulic -->
  <rect x="10" y="14" width="108" height="100" rx="10" fill="#06101e"/>
  <g stroke="rgba(56,189,248,0.08)" stroke-width="1">
    <line x1="10"  y1="40"  x2="118" y2="40"/>
    <line x1="10"  y1="64"  x2="118" y2="64"/>
    <line x1="10"  y1="88"  x2="118" y2="88"/>
    <line x1="34"  y1="14"  x2="34"  y2="114"/>
    <line x1="64"  y1="14"  x2="64"  y2="114"/>
    <line x1="94"  y1="14"  x2="94"  y2="114"/>
  </g>

  <!-- bloki budynków -->
  <rect x="14"  y="18" width="16" height="18" rx="3" fill="#0d1a2d"/>
  <rect x="38"  y="18" width="22" height="18" rx="3" fill="#0d1a2d"/>
  <rect x="68"  y="18" width="22" height="18" rx="3" fill="#0d1a2d"/>
  <rect x="98"  y="18" width="16" height="18" rx="3" fill="#0d1a2d"/>
  <rect x="14"  y="44" width="16" height="16" rx="3" fill="#0d1a2d"/>
  <rect x="38"  y="44" width="22" height="16" rx="3" fill="#0d1a2d"/>

  <!-- linia rozdziałów -->
  <path d="M30 98 C38 80 54 72 64 52 C74 34 86 30 96 22"
        fill="none" stroke="#fbbf24" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
        stroke-dasharray="8 4" filter="url(#glow-cm)" opacity=".7"/>

  <!-- węzły rozdziałów -->
  <!-- ukończony -->
  <circle cx="30" cy="98" r="9" fill="#052e16" stroke="#4ade80" stroke-width="2" filter="url(#glow-cm)"/>
  <text x="30" y="102" font-size="10" font-weight="800" font-family="Arial" fill="#4ade80" text-anchor="middle">✓</text>

  <!-- aktywny -->
  <circle cx="64" cy="52" r="10" fill="#1e3a5f" stroke="#38bdf8" stroke-width="2.5" filter="url(#glow-cm)"/>
  <text x="64" y="56" font-size="10" font-weight="800" font-family="Arial" fill="#38bdf8" text-anchor="middle">2</text>

  <!-- zablokowany -->
  <circle cx="96" cy="22" r="8" fill="#1a1a1a" stroke="#374151" stroke-width="1.5"/>
  <rect x="92" y="18" width="8" height="6" rx="2" fill="none" stroke="#4b5563" stroke-width="1.5"/>
  <rect x="91" y="22" width="10" height="7" rx="2" fill="#374151"/>

  <!-- znaczniki incydentów -->
  <rect x="48" y="68" width="10" height="10" rx="2" fill="#7f1d1d" stroke="#ef4444" stroke-width="1" filter="url(#glow-cm)" opacity=".8"/>
  <rect x="72" y="42" width="10" height="10" rx="2" fill="#1e3a5f" stroke="#38bdf8" stroke-width="1" filter="url(#glow-cm)" opacity=".8"/>
</svg>
