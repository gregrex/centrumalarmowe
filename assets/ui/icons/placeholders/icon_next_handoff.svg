<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs><filter id="g"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
  <rect width="128" height="128" rx="16" fill="#030710"/>
  <!-- etap poprzedni (lewy, ukończony) -->
  <circle cx="28" cy="64" r="18" fill="#052e16" stroke="#4ade80" stroke-width="2"/>
  <polyline points="20,64 26,70 38,56" fill="none" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- strzałka "next" -->
  <line x1="46" y1="64" x2="72" y2="64" stroke="#38bdf8" stroke-width="3" stroke-linecap="round" filter="url(#g)"/>
  <polygon points="72,57 84,64 72,71" fill="#38bdf8" filter="url(#g)"/>
  <!-- etap następny (prawy, aktywny) -->
  <circle cx="106" cy="64" r="18" fill="#1e3a5f" stroke="#38bdf8" stroke-width="2.5" filter="url(#g)"/>
  <text x="106" y="68" font-size="16" font-weight="900" font-family="Arial" fill="#38bdf8" text-anchor="middle">→</text>
  <!-- etykieta -->
  <text x="64" y="108" font-size="9" font-weight="600" font-family="Arial" fill="rgba(56,189,248,0.45)" text-anchor="middle" letter-spacing="1">NEXT HANDOFF</text>
</svg>
