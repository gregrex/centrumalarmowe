<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <filter id="glow-mr"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="128" height="128" rx="18" fill="#030710"/>
  <rect x="1.5" y="1.5" width="125" height="125" rx="17" fill="none" stroke="rgba(56,189,248,0.2)" stroke-width="1.5"/>
  <!-- zegar tło -->
  <circle cx="64" cy="62" r="40" fill="#06101e" stroke="rgba(56,189,248,0.15)" stroke-width="2"/>
  <!-- tarcza czasowa -->
  <circle cx="64" cy="62" r="40" fill="none" stroke="rgba(56,189,248,0.1)" stroke-width="8"/>
  <circle cx="64" cy="62" r="40" fill="none" stroke="#38bdf8" stroke-width="8"
          stroke-dasharray="176 251" stroke-dashoffset="-62" stroke-linecap="round"
          transform="rotate(-90 64 62)" filter="url(#glow-mr)"/>
  <!-- wskazówki -->
  <line x1="64" y1="62" x2="64" y2="36" stroke="#d8e0ec" stroke-width="3" stroke-linecap="round"/>
  <line x1="64" y1="62" x2="82" y2="70" stroke="#d8e0ec" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="64" cy="62" r="4" fill="#38bdf8" filter="url(#glow-mr)"/>
  <!-- play triangle (aktywna misja) -->
  <polygon points="56,102 80,112 80,92" fill="#4ade80" filter="url(#glow-mr)"/>
  <!-- etykieta RUNTIME -->
  <text x="34" y="116" font-size="11" font-weight="700" font-family="Arial" fill="rgba(56,189,248,0.5)" letter-spacing="2">RUNTIME</text>
</svg>
