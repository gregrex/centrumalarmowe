<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <radialGradient id="fail-bg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#2d0b0b"/>
      <stop offset="100%" stop-color="#100303"/>
    </radialGradient>
    <filter id="glow-gf">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="4" y="4" width="120" height="120" rx="26" fill="url(#fail-bg)" stroke="#ef4444" stroke-width="2.5"/>
  <circle cx="64" cy="64" r="46" fill="none" stroke="#ef4444" stroke-width="2" opacity=".3" filter="url(#glow-gf)"/>
  <circle cx="64" cy="64" r="36" fill="#2d0b0b" stroke="#ef4444" stroke-width="3" filter="url(#glow-gf)"/>
  <!-- X krzyż porażki -->
  <line x1="46" y1="46" x2="82" y2="82" stroke="#fca5a5" stroke-width="8" stroke-linecap="round" filter="url(#glow-gf)"/>
  <line x1="82" y1="46" x2="46" y2="82" stroke="#fca5a5" stroke-width="8" stroke-linecap="round" filter="url(#glow-gf)"/>
  <text x="64" y="118" font-size="11" font-weight="700" font-family="Arial" fill="#ef4444"
        text-anchor="middle" letter-spacing="1">PORAŻKA</text>
</svg>
