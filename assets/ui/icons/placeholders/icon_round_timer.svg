<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <filter id="glow-clk">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="arc-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
  </defs>
  <rect x="4" y="4" width="120" height="120" rx="24" fill="#0d0700"/>
  <!-- tarcza zewnętrzna – szara -->
  <circle cx="64" cy="64" r="48" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="8"/>
  <!-- łuk postępu – 70% okręgu -->
  <circle cx="64" cy="64" r="48"
          fill="none" stroke="url(#arc-grad)" stroke-width="8"
          stroke-linecap="round"
          stroke-dasharray="211 302"
          stroke-dashoffset="-46"
          filter="url(#glow-clk)"/>
  <!-- znaczniki minut -->
  <g stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-linecap="round">
    <line x1="64" y1="20" x2="64" y2="28"/>
    <line x1="64" y1="100" x2="64" y2="108"/>
    <line x1="20" y1="64" x2="28" y2="64"/>
    <line x1="100" y1="64" x2="108" y2="64"/>
  </g>
  <!-- tarcza wewnętrzna -->
  <circle cx="64" cy="64" r="36" fill="#1a0f00"/>
  <!-- cyfra czasu (urgent) -->
  <text x="64" y="58" font-size="28" font-weight="900" font-family="Arial Black, Arial"
        fill="#f59e0b" text-anchor="middle" filter="url(#glow-clk)">02</text>
  <text x="64" y="76" font-size="11" font-family="Arial" fill="rgba(255,255,255,0.4)"
        text-anchor="middle" letter-spacing="1">MIN</text>
  <!-- wskazówka minutowa -->
  <line x1="64" y1="64" x2="64" y2="34" stroke="#fbbf24" stroke-width="3.5" stroke-linecap="round" filter="url(#glow-clk)"/>
  <!-- wskazówka sekundowa -->
  <line x1="64" y1="64" x2="84" y2="56" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
  <!-- środek tarczy -->
  <circle cx="64" cy="64" r="4" fill="#f59e0b"/>
</svg>
