<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96">
  <defs>
    <filter id="glow-rec">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="2" y="2" width="92" height="92" rx="16" fill="#03101e"/>
  <!-- karta - cień -->
  <rect x="14" y="10" width="68" height="76" rx="9" fill="#0a1929" stroke="rgba(56,189,248,0.25)" stroke-width="1.5"/>
  <!-- nagłówek karty -->
  <rect x="14" y="10" width="68" height="22" rx="9" fill="#1e3a5f"/>
  <rect x="14" y="24" width="68" height="8" fill="#1e3a5f"/>
  <text x="48" y="25" font-size="9" font-weight="700" font-family="Arial" fill="#7dd3fc" text-anchor="middle" letter-spacing="0.5">RECOVERY</text>
  <!-- pasek 1 - niebieski -->
  <rect x="22" y="40" width="52" height="8" rx="3" fill="#1e3a5f"/>
  <rect x="22" y="40" width="36" height="8" rx="3" fill="#38bdf8" filter="url(#glow-rec)" opacity=".85"/>
  <!-- pasek 2 - pomarańczowy -->
  <rect x="22" y="53" width="52" height="8" rx="3" fill="#2d1c04"/>
  <rect x="22" y="53" width="24" height="8" rx="3" fill="#fb923c" opacity=".9"/>
  <!-- pasek 3 - zielony -->
  <rect x="22" y="66" width="52" height="8" rx="3" fill="#052010"/>
  <rect x="22" y="66" width="44" height="8" rx="3" fill="#4ade80" filter="url(#glow-rec)" opacity=".85"/>
  <!-- znacznik stanu - kółko z checkmark -->
  <circle cx="74" cy="53" r="9" fill="#15803d" stroke="#4ade80" stroke-width="1.5" filter="url(#glow-rec)"/>
  <polyline points="70,53 73,57 78,49" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
