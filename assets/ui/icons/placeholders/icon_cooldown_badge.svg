<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <filter id="glow-cd">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="1" y="1" width="62" height="62" rx="12" fill="#0a0208" stroke="#a855f7" stroke-width="1.5"/>
  <!-- zegar / cooldown arc -->
  <circle cx="32" cy="30" r="20" fill="#160a2a" stroke="rgba(168,85,247,0.2)" stroke-width="2"/>
  <!-- łuk cooldown (50%) -->
  <circle cx="32" cy="30" r="20" fill="none"
          stroke="#a855f7" stroke-width="5"
          stroke-linecap="round"
          stroke-dasharray="63 126"
          stroke-dashoffset="-32"
          filter="url(#glow-cd)"/>
  <!-- wskazówka -->
  <line x1="32" y1="30" x2="32" y2="14" stroke="#c4b5fd" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="32" cy="30" r="3" fill="#a855f7"/>
  <!-- ikona blokady pod zegarem -->
  <rect x="26" y="51" width="12" height="10" rx="2.5" fill="#4c1d95" stroke="#a855f7" stroke-width="1.2"/>
  <path d="M29 51 C29 47 35 47 35 51" fill="none" stroke="#a855f7" stroke-width="1.5"/>
  <circle cx="32" cy="56" r="1.8" fill="#c4b5fd"/>
</svg>
