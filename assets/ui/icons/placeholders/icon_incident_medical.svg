<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96">
  <defs>
    <filter id="glow-med">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="2" y="2" width="92" height="92" rx="18" fill="#020d1a" stroke="#22d3ee" stroke-width="2.5"/>
  <!-- czerwone koło ratunkowe -->
  <circle cx="48" cy="46" r="26" fill="#dc2626" opacity=".95"/>
  <circle cx="48" cy="46" r="22" fill="#991b1b"/>
  <!-- biały krzyż -->
  <rect x="40" y="28" width="16" height="36" rx="4" fill="#fff"/>
  <rect x="30" y="38" width="36" height="16" rx="4" fill="#fff"/>
  <!-- linia EKG / puls pod krzyżem -->
  <polyline points="14,72 22,72 26,64 31,78 36,68 41,72 55,72 59,65 63,79 67,72 82,72"
            fill="none" stroke="#22d3ee" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"
            filter="url(#glow-med)"/>
</svg>
