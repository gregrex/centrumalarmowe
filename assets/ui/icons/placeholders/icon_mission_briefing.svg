<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg-brief" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#03060e"/>
      <stop offset="100%" stop-color="#06101e"/>
    </linearGradient>
    <filter id="glow-br">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-br-sm">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="url(#bg-brief)"/>

  <!-- dekoracyjny grid -->
  <g stroke="rgba(56,189,248,0.06)" stroke-width="1">
    <line x1="0"   y1="256"  x2="1024" y2="256"/>
    <line x1="0"   y1="512"  x2="1024" y2="512"/>
    <line x1="0"   y1="768"  x2="1024" y2="768"/>
    <line x1="256" y1="0"    x2="256"  y2="1024"/>
    <line x1="512" y1="0"    x2="512"  y2="1024"/>
    <line x1="768" y1="0"    x2="768"  y2="1024"/>
  </g>

  <!-- ── PANEL BRIEFINGOWY ──────────────────────────── -->
  <rect x="100" y="160" width="824" height="660" rx="24" fill="#060d1a" stroke="rgba(56,189,248,0.25)" stroke-width="2.5" filter="url(#glow-br-sm)"/>

  <!-- nagłówek panelu -->
  <rect x="100" y="160" width="824" height="76" rx="24" fill="#0d2035"/>
  <rect x="100" y="212" width="824" height="24" fill="#0d2035"/>
  <!-- pasek akcentu -->
  <rect x="100" y="160" width="5" height="76" rx="2" fill="#38bdf8" filter="url(#glow-br)"/>
  <!-- napis BRIEFING MISJI -->
  <text x="160" y="210" font-size="36" font-weight="800" font-family="Arial Black, Arial" fill="#38bdf8" letter-spacing="3">BRIEFING MISJI</text>
  <!-- badge PILNE -->
  <rect x="740" y="178" width="130" height="40" rx="8" fill="#7f1d1d" stroke="#ef4444" stroke-width="1.5" filter="url(#glow-br-sm)"/>
  <text x="805" y="203" font-size="20" font-weight="700" font-family="Arial" fill="#fca5a5" text-anchor="middle">⚠ PILNE</text>

  <!-- ── LEWA KOLUMNA: info o misji ─────────────────── -->
  <!-- miniaturka mapy -->
  <rect x="124" y="262" width="380" height="260" rx="12" fill="#020810" stroke="rgba(56,189,248,0.2)" stroke-width="1.5"/>
  <!-- siatka mini-mapy -->
  <g stroke="rgba(56,189,248,0.10)" stroke-width="1">
    <line x1="124" y1="330" x2="504" y2="330"/>
    <line x1="124" y1="394" x2="504" y2="394"/>
    <line x1="124" y1="458" x2="504" y2="458"/>
    <line x1="220" y1="262" x2="220" y2="522"/>
    <line x1="316" y1="262" x2="316" y2="522"/>
    <line x1="412" y1="262" x2="412" y2="522"/>
  </g>
  <!-- bloki budynków na mini-mapie -->
  <rect x="134" y="272" width="76" height="48" rx="4" fill="#0d1a2d" stroke="rgba(56,189,248,0.15)" stroke-width="1"/>
  <rect x="230" y="272" width="76" height="48" rx="4" fill="#0d1a2d" stroke="rgba(56,189,248,0.15)" stroke-width="1"/>
  <rect x="326" y="272" width="76" height="48" rx="4" fill="#0d1a2d" stroke="rgba(56,189,248,0.15)" stroke-width="1"/>
  <rect x="134" y="340" width="76" height="44" rx="4" fill="#0d1a2d" stroke="rgba(56,189,248,0.15)" stroke-width="1"/>
  <rect x="230" y="340" width="76" height="44" rx="4" fill="#0d1a2d"/>
  <rect x="326" y="340" width="76" height="44" rx="4" fill="#0d1a2d"/>
  <!-- marker incydentu na mapie -->
  <circle cx="280" cy="400" r="22" fill="#7f1d1d" stroke="#ef4444" stroke-width="2.5" filter="url(#glow-br-sm)"/>
  <circle cx="280" cy="410" r="22" fill="#7f1d1d"/>
  <path d="M280 380 C272 380 268 386 268 394 C268 404 280 416 280 416 C280 416 292 404 292 394 C292 386 288 380 280 380Z" fill="#ef4444"/>
  <circle cx="280" cy="393" r="7" fill="#fff" opacity=".85"/>
  <!-- trasa do incydentu -->
  <path d="M160 490 C180 470 220 440 268 414" fill="none" stroke="#22c55e" stroke-width="3"
        stroke-dasharray="10 6" stroke-linecap="round" opacity=".7" filter="url(#glow-br-sm)"/>
  <!-- ikona ambulansu na trasie -->
  <rect x="196" y="460" width="24" height="14" rx="3" fill="#f1f5f9" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="202" y="466" width="8" height="8" rx="1" fill="#16a34a"/>
  <rect x="211" y="466" width="6" height="8" rx="1" fill="#22c55e" opacity=".6"/>

  <!-- ── PRAWA KOLUMNA: dane misji ──────────────────── -->
  <rect x="528" y="262" width="372" height="260" rx="12" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <!-- wiersze danych -->
  <g font-family="Arial" fill="#8b96a8" font-size="20">
    <text x="548" y="302">Misja</text>
    <text x="548" y="346">Kategoria</text>
    <text x="548" y="390">Lokacja</text>
    <text x="548" y="434">Priorytet</text>
    <text x="548" y="478">Jednostki</text>
    <text x="548" y="506">ETA</text>
  </g>
  <g font-family="Arial" fill="#d8e0ec" font-size="22" font-weight="600">
    <text x="700" y="302">Demo Shift — Misja 01</text>
    <text x="700" y="346">Pożar budynku</text>
    <text x="700" y="390">ul. Żelazna 14, Centrum</text>
  </g>
  <!-- badge priorytet WYSOKI -->
  <rect x="700" y="416" width="120" height="32" rx="6" fill="#7f1d1d" stroke="#ef4444" stroke-width="1.5" filter="url(#glow-br-sm)"/>
  <text x="760" y="437" font-size="18" font-weight="700" font-family="Arial" fill="#fca5a5" text-anchor="middle">WYSOKI</text>
  <!-- jednostki z ikonkami -->
  <text x="700" y="478" font-size="22" font-weight="600" font-family="Arial" fill="#d8e0ec">🚒 ×2  🚑 ×1</text>
  <text x="700" y="506" font-size="22" font-weight="600" font-family="Arial" fill="#fbbf24">4 min</text>

  <!-- ── DOLNA SEKCJA: Role i ich zadania ───────────── -->
  <rect x="124" y="548" width="776" height="100" rx="10" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="148" y="580" font-size="18" font-weight="700" font-family="Arial" fill="#8b96a8" letter-spacing="2">ZAANGAŻOWANE ROLE</text>
  <!-- role badges -->
  <rect x="148" y="590" width="160" height="42" rx="8" fill="#1e3a5f" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="228" y="616" font-size="16" font-weight="600" font-family="Arial" fill="#38bdf8" text-anchor="middle">Call Operator</text>
  <rect x="324" y="590" width="160" height="42" rx="8" fill="#431407" stroke="#fb923c" stroke-width="1.5"/>
  <text x="404" y="616" font-size="16" font-weight="600" font-family="Arial" fill="#fb923c" text-anchor="middle">Dispatcher</text>
  <rect x="500" y="590" width="190" height="42" rx="8" fill="#052e16" stroke="#4ade80" stroke-width="1.5"/>
  <text x="595" y="616" font-size="16" font-weight="600" font-family="Arial" fill="#4ade80" text-anchor="middle">Ops Coordinator</text>

  <!-- ── PRZYCISK START ──────────────────────────────── -->
  <rect x="340" y="686" width="344" height="80" rx="14" fill="#ff4b1f" stroke="#ff7052" stroke-width="2" filter="url(#glow-br)"/>
  <text x="512" y="735" font-size="34" font-weight="800" font-family="Arial Black, Arial"
        fill="#fff" text-anchor="middle" letter-spacing="4">ROZPOCZNIJ MISJĘ →</text>

  <!-- TYTUŁ STRONY -->
  <text x="512" y="120" font-size="42" font-weight="900" font-family="Arial Black, Arial" fill="#d8e0ec"
        text-anchor="middle" letter-spacing="5">CENTRUM ALARMOWE</text>
  <text x="512" y="148" font-size="18" font-family="Arial" fill="rgba(56,189,248,0.5)"
        text-anchor="middle" letter-spacing="3">MISSION BRIEFING · DEMO</text>

  <!-- vignette -->
  <radialGradient id="vig-br" cx="50%" cy="50%" r="70%">
    <stop offset="0%" stop-color="transparent"/>
    <stop offset="100%" stop-color="rgba(0,0,0,0.60)"/>
  </radialGradient>
  <rect width="1024" height="1024" fill="url(#vig-br)"/>
</svg>
