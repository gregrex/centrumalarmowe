<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96">
  <defs><filter id="glow-df"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
  <rect width="96" height="96" rx="14" fill="#030710"/>
  <!-- krok 1: lobby (niebieski) -->
  <circle cx="14" cy="48" r="10" fill="#1e3a5f" stroke="#38bdf8" stroke-width="2" filter="url(#glow-df)"/>
  <text x="14" y="52" font-size="9" font-weight="700" font-family="Arial" fill="#38bdf8" text-anchor="middle">1</text>
  <!-- strzałka -->
  <line x1="24" y1="48" x2="32" y2="48" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
  <polygon points="32,45 37,48 32,51" fill="#94a3b8"/>
  <!-- krok 2: misja (zielony) -->
  <circle cx="48" cy="48" r="10" fill="#052e16" stroke="#4ade80" stroke-width="2" filter="url(#glow-df)"/>
  <text x="48" y="52" font-size="9" font-weight="700" font-family="Arial" fill="#4ade80" text-anchor="middle">2</text>
  <!-- strzałka -->
  <line x1="58" y1="48" x2="66" y2="48" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
  <polygon points="66,45 71,48 66,51" fill="#94a3b8"/>
  <!-- krok 3: raport (złoty) -->
  <circle cx="82" cy="48" r="10" fill="#1a1000" stroke="#fbbf24" stroke-width="2" filter="url(#glow-df)"/>
  <text x="82" y="52" font-size="9" font-weight="700" font-family="Arial" fill="#fbbf24" text-anchor="middle">3</text>
  <!-- etykiety -->
  <text x="14" y="70" font-size="7" font-family="Arial" fill="#38bdf8" text-anchor="middle">LOBBY</text>
  <text x="48" y="70" font-size="7" font-family="Arial" fill="#4ade80" text-anchor="middle">MISJA</text>
  <text x="82" y="70" font-size="7" font-family="Arial" fill="#fbbf24" text-anchor="middle">RAPORT</text>
  <!-- etykieta FLOW -->
  <text x="48" y="88" font-size="8" font-weight="700" font-family="Arial" fill="rgba(255,255,255,0.2)" text-anchor="middle" letter-spacing="2">DEMO FLOW</text>
</svg>
