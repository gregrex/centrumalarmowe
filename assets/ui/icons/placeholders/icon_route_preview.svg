<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96">
  <defs>
    <filter id="glow-rt">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="start-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#4ade80" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="end-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect x="2" y="2" width="92" height="92" rx="18" fill="#060e1a"/>
  <!-- siatka mapy (mini) -->
  <g stroke="rgba(56,189,248,0.12)" stroke-width="1">
    <line x1="0"  y1="32" x2="96" y2="32"/>
    <line x1="0"  y1="64" x2="96" y2="64"/>
    <line x1="32" y1="0"  x2="32" y2="96"/>
    <line x1="64" y1="0"  x2="64" y2="96"/>
  </g>
  <!-- aureola start/end -->
  <circle cx="22" cy="72" r="14" fill="url(#start-glow)" opacity=".6"/>
  <circle cx="74" cy="22" r="14" fill="url(#end-glow)" opacity=".5"/>
  <!-- linia trasy – zakrzywiona, przerywana -->
  <path d="M22 72 C26 52 46 46 60 34 C66 28 70 24 74 22"
        fill="none" stroke="#38bdf8" stroke-width="3.5"
        stroke-dasharray="8 5" stroke-linecap="round"
        filter="url(#glow-rt)"/>
  <!-- punkt startowy -->
  <circle cx="22" cy="72" r="7" fill="#4ade80" stroke="#052e16" stroke-width="2"/>
  <circle cx="22" cy="72" r="3" fill="#fff"/>
  <!-- pin docelowy -->
  <circle cx="74" cy="22" r="8" fill="#f97316" stroke="#1c0800" stroke-width="2" filter="url(#glow-rt)"/>
  <circle cx="74" cy="26" r="8" fill="#f97316" stroke="none"/>
  <path d="M74 16 C68 16 64 20 64 25 C64 32 74 40 74 40 C74 40 84 32 84 25 C84 20 80 16 74 16Z" fill="#f97316"/>
  <circle cx="74" cy="25" r="4" fill="#fff" opacity=".85"/>
</svg>
