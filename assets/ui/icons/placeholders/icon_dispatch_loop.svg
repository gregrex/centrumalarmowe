<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96">
  <defs>
    <filter id="glow-d">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="2" y="2" width="92" height="92" rx="18" fill="#010d07" stroke="#22c55e" stroke-width="2"/>
  <!-- ikona radiowozu wysyłanego -->
  <rect x="12" y="54" width="36" height="18" rx="4" fill="#1e3a5f"/>
  <rect x="12" y="48" width="36" height="8"  rx="3" fill="#1d4ed8"/>
  <!-- syren na radiowozie -->
  <rect x="16" y="46" width="8" height="4" rx="2" fill="#38bdf8" filter="url(#glow-d)" opacity=".9"/>
  <rect x="28" y="46" width="8" height="4" rx="2" fill="#ef4444" filter="url(#glow-d)" opacity=".8"/>
  <!-- koła -->
  <circle cx="22" cy="72" r="5" fill="#0f172a" stroke="#38bdf8" stroke-width="1.5"/>
  <circle cx="40" cy="72" r="5" fill="#0f172a" stroke="#38bdf8" stroke-width="1.5"/>
  <!-- strzałka dispatch / wysłanie -->
  <path d="M54 58 L78 58" stroke="#22c55e" stroke-width="4" stroke-linecap="round"
        filter="url(#glow-d)"/>
  <polygon points="78,58 68,52 68,64" fill="#22c55e" filter="url(#glow-d)"/>
  <!-- marker incydentu (cel) -->
  <circle cx="84" cy="42" r="10" fill="#7f1d1d" stroke="#ef4444" stroke-width="2" filter="url(#glow-d)"/>
  <circle cx="84" cy="46" r="10" fill="#7f1d1d"/>
  <path d="M84 32 C78 32 74 36 74 42 C74 50 84 58 84 58 C84 58 94 50 94 42 C94 36 90 32 84 32Z" fill="#ef4444"/>
  <circle cx="84" cy="41" r="4" fill="#fff" opacity=".85"/>
  <!-- etykieta DISPATCH -->
  <text x="48" y="88" font-size="8" font-weight="700" font-family="Arial" fill="rgba(74,222,128,0.6)" text-anchor="middle" letter-spacing="1">DISPATCH</text>
</svg>
