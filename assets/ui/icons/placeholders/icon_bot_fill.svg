<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <filter id="glow-bot">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="bot-core" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity=".3"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect x="4" y="4" width="120" height="120" rx="24" fill="#020d18"/>
  <!-- aura AI -->
  <circle cx="64" cy="56" r="48" fill="url(#bot-core)"/>
  <!-- głowa robota -->
  <rect x="36" y="28" width="56" height="48" rx="12" fill="#0d2035" stroke="#38bdf8" stroke-width="2.5" filter="url(#glow-bot)"/>
  <!-- antena -->
  <line x1="64" y1="28" x2="64" y2="16" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="64" cy="14" r="5" fill="#38bdf8" filter="url(#glow-bot)"/>
  <!-- oczy – diody LED -->
  <rect x="44" y="42" width="14" height="10" rx="4" fill="#38bdf8" filter="url(#glow-bot)" opacity=".9"/>
  <rect x="70" y="42" width="14" height="10" rx="4" fill="#38bdf8" filter="url(#glow-bot)" opacity=".9"/>
  <!-- usta – pasek LED -->
  <rect x="46" y="60" width="36" height="6" rx="3" fill="#0369a1"/>
  <rect x="46" y="60" width="12" height="6" rx="3" fill="#38bdf8" filter="url(#glow-bot)"/>
  <!-- tułów / korpus -->
  <rect x="42" y="80" width="44" height="28" rx="8" fill="#0d2035" stroke="#0369a1" stroke-width="1.5"/>
  <!-- wskaźnik AI aktywny -->
  <rect x="50" y="86" width="28" height="5" rx="2" fill="#0c4a6e"/>
  <rect x="50" y="86" width="22" height="5" rx="2" fill="#22d3ee" filter="url(#glow-bot)"/>
  <rect x="50" y="95" width="28" height="5" rx="2" fill="#0c4a6e"/>
  <rect x="50" y="95" width="16" height="5" rx="2" fill="#38bdf8" opacity=".7"/>
  <!-- etykieta -->
  <text x="64" y="120" font-size="10" font-weight="700" font-family="Arial" fill="#38bdf8" text-anchor="middle" letter-spacing="1.5">AI BOT</text>
</svg>
