<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs><filter id="glow-sd"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
  <rect width="128" height="128" rx="16" fill="#030710"/>
  <!-- ekran showcase -->
  <rect x="12" y="20" width="104" height="72" rx="10" fill="#06101e" stroke="rgba(251,191,36,0.25)" stroke-width="1.5"/>
  <!-- scena na ekranie: nocne miasto -->
  <rect x="12" y="54" width="104" height="38" rx="0" fill="#030810"/>
  <!-- budynki mini -->
  <rect x="16" y="44" width="12" height="18" fill="#0d1a2d"/>
  <rect x="32" y="36" width="16" height="26" fill="#0d1a2d"/>
  <rect x="52" y="40" width="20" height="22" fill="#0d1a2d"/>
  <rect x="76" y="34" width="14" height="28" fill="#0d1a2d"/>
  <rect x="94" y="42" width="18" height="20" fill="#0d1a2d"/>
  <!-- syrena glow -->
  <circle cx="64" cy="50" r="12" fill="rgba(239,68,68,0.3)" filter="url(#glow-sd)"/>
  <circle cx="64" cy="50" r="5" fill="#ef4444" filter="url(#glow-sd)"/>
  <!-- play button overlay -->
  <polygon points="52,64 80,78 52,92" fill="#fbbf24" filter="url(#glow-sd)"/>
  <!-- napis DEMO -->
  <rect x="18" y="22" width="44" height="16" rx="4" fill="#1a2e0a" stroke="#4ade80" stroke-width="1"/>
  <text x="40" y="33" font-size="10" font-weight="700" font-family="Arial" fill="#4ade80" text-anchor="middle">▶ DEMO</text>
  <!-- badge LIVE -->
  <rect x="90" y="22" width="26" height="16" rx="4" fill="#7f1d1d" stroke="#ef4444" stroke-width="1" filter="url(#glow-sd)"/>
  <text x="103" y="33" font-size="10" font-weight="700" font-family="Arial" fill="#fca5a5" text-anchor="middle">LIVE</text>
  <!-- stand monitora -->
  <rect x="56" y="92" width="16" height="8" rx="2" fill="#0d1a2d"/>
  <rect x="44" y="100" width="40" height="4" rx="2" fill="#0d1a2d"/>
  <!-- etykieta -->
  <text x="64" y="118" font-size="10" font-weight="600" font-family="Arial" fill="rgba(251,191,36,0.5)" text-anchor="middle" letter-spacing="2">SHOWCASE</text>
</svg>
