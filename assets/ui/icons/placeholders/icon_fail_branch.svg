<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96">
  <defs>
    <filter id="glow-fb">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="2" y="2" width="92" height="92" rx="18" fill="#100202" stroke="#ef4444" stroke-width="2"/>
  <!-- strzałka w dół (misja nie powiodła się) -->
  <line x1="48" y1="16" x2="48" y2="48" stroke="#ef4444" stroke-width="4" stroke-linecap="round" filter="url(#glow-fb)"/>
  <polygon points="48,58 38,42 58,42" fill="#ef4444" filter="url(#glow-fb)"/>
  <!-- rozgałęzienie – dwie ścieżki -->
  <line x1="48" y1="58" x2="28" y2="78" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>
  <line x1="48" y1="58" x2="68" y2="78" stroke="#22c55e" stroke-width="3" stroke-linecap="round"/>
  <!-- ikona retry (lewo) -->
  <circle cx="22" cy="82" r="9" fill="#78350f" stroke="#f59e0b" stroke-width="2"/>
  <path d="M18 82 C18 78 26 76 26 82" fill="none" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
  <polygon points="26,82 22,88 30,88" fill="#fbbf24"/>
  <!-- ikona next (prawo) -->
  <circle cx="74" cy="82" r="9" fill="#052e16" stroke="#22c55e" stroke-width="2"/>
  <polygon points="70,82 78,78 78,86" fill="#4ade80"/>
</svg>
