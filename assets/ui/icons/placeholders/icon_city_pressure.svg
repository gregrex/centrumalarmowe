<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <filter id="glow-cp">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="1" y="1" width="62" height="62" rx="12" fill="#0d0005" stroke="#ef4444" stroke-width="1.5"/>
  <!-- oś Y -->
  <line x1="14" y1="8" x2="14" y2="52" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <!-- oś X -->
  <line x1="14" y1="52" x2="58" y2="52" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <!-- wykres city pressure – rosnący, krytyczny -->
  <polyline points="14,48 22,42 30,36 36,30 42,20 50,14 56,10"
            fill="none" stroke="#ef4444" stroke-width="3"
            stroke-linecap="round" stroke-linejoin="round" filter="url(#glow-cp)"/>
  <!-- fill pod linią -->
  <polygon points="14,48 22,42 30,36 36,30 42,20 50,14 56,10 56,52 14,52"
           fill="#ef4444" opacity=".12"/>
  <!-- punkty danych -->
  <circle cx="42" cy="20" r="3.5" fill="#fca5a5"/>
  <circle cx="56" cy="10" r="4"   fill="#ef4444" filter="url(#glow-cp)"/>
  <!-- etykieta PRESJA -->
  <text x="36" y="62" font-size="7" font-weight="700" font-family="Arial" fill="rgba(239,68,68,0.65)" text-anchor="middle" letter-spacing="0.5">PRESJA</text>
  <!-- linia krytyczna pozioma -->
  <line x1="14" y1="18" x2="58" y2="18" stroke="#ef4444" stroke-width="1" stroke-dasharray="4 3" opacity=".35"/>
</svg>
