<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96">
  <defs>
    <filter id="glow-crit">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="bg-crit" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2d0b0b"/>
      <stop offset="100%" stop-color="#100303"/>
    </radialGradient>
  </defs>
  <rect x="2" y="2" width="92" height="92" rx="18" fill="url(#bg-crit)" stroke="#ef4444" stroke-width="2.5"/>
  <!-- pierścień pulsujący (zewnętrzny) -->
  <circle cx="48" cy="48" r="36" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6 4" opacity=".4"/>
  <!-- trójkąt alarmowy -->
  <path d="M48 18 L82 74 L14 74 Z" fill="#7f1d1d" stroke="#ef4444" stroke-width="2.5" stroke-linejoin="round" filter="url(#glow-crit)"/>
  <path d="M48 22 L78 72 L18 72 Z" fill="#991b1b"/>
  <!-- wykrzyknik -->
  <rect x="44.5" y="36" width="7" height="20" rx="3" fill="#fca5a5"/>
  <circle cx="48" cy="63" r="4" fill="#fca5a5"/>
</svg>
