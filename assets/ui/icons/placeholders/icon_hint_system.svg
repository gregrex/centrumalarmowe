<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <filter id="glow-hi"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="128" height="128" rx="16" fill="#04080e"/>
  <!-- żarówka/lampka -->
  <ellipse cx="64" cy="52" rx="22" ry="26" fill="#1e3a5f" stroke="#38bdf8" stroke-width="2.5" filter="url(#glow-hi)"/>
  <!-- nitka żarówki -->
  <path d="M56 68 C56 72 72 72 72 68" fill="none" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" filter="url(#glow-hi)"/>
  <path d="M58 72 L58 78 L70 78 L70 72" fill="none" stroke="#7dd3fc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="64" y1="78" x2="64" y2="84" stroke="#7dd3fc" stroke-width="2" stroke-linecap="round"/>
  <!-- promienie glow -->
  <g stroke="#fbbf24" stroke-width="2" stroke-linecap="round" opacity=".5">
    <line x1="40" y1="52" x2="32" y2="52"/>
    <line x1="88" y1="52" x2="96" y2="52"/>
    <line x1="44" y1="34" x2="38" y2="28"/>
    <line x1="84" y1="34" x2="90" y2="28"/>
    <line x1="64" y1="22" x2="64" y2="14"/>
  </g>
  <!-- litera ? w środku -->
  <text x="64" y="58" font-size="24" font-weight="900" font-family="Arial" fill="#38bdf8" text-anchor="middle" filter="url(#glow-hi)">?</text>
  <!-- etykieta -->
  <text x="64" y="108" font-size="13" font-weight="600" font-family="Arial" fill="rgba(56,189,248,0.5)" text-anchor="middle" letter-spacing="2">PODPOWIEDŹ</text>
</svg>
