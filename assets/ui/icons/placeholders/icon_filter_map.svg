<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <filter id="glow-fm"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="64" height="64" rx="10" fill="#030710"/>
  <!-- mini mapa tło -->
  <rect x="4" y="4" width="56" height="56" rx="8" fill="#06101e"/>
  <g stroke="rgba(56,189,248,0.1)" stroke-width="1">
    <line x1="4" y1="22" x2="60" y2="22"/><line x1="4" y1="40" x2="60" y2="40"/>
    <line x1="22" y1="4" x2="22" y2="60"/><line x1="42" y1="4" x2="42" y2="60"/>
  </g>
  <!-- marker incydentu aktywny -->
  <circle cx="32" cy="28" r="5" fill="#7f1d1d" stroke="#ef4444" stroke-width="1.5" filter="url(#glow-fm)"/>
  <!-- marker medical -->
  <circle cx="48" cy="40" r="4" fill="#1e3a5f" stroke="#38bdf8" stroke-width="1.5" filter="url(#glow-fm)"/>
  <!-- lejek filtra nad mapą (overlay) -->
  <polygon points="8,8 56,8 42,28 42,52 22,52 22,28" fill="rgba(56,189,248,0.08)" stroke="#38bdf8" stroke-width="1.5"/>
  <line x1="8" y1="8" x2="56" y2="8" stroke="#38bdf8" stroke-width="2" stroke-linecap="round" filter="url(#glow-fm)"/>
  <line x1="18" y1="18" x2="46" y2="18" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="26" y1="28" x2="38" y2="28" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round"/>
</svg>
