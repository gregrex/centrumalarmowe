<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <filter id="glow-fn">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="256" height="256" rx="24" fill="#06090f"/>
  <rect x="2" y="2" width="252" height="252" rx="23" fill="none" stroke="rgba(251,146,60,0.3)" stroke-width="2"/>

  <!-- tło: poprzednia misja (przekreślona) -->
  <rect x="24" y="32" width="208" height="72" rx="10" fill="#1a0505" stroke="rgba(239,68,68,0.4)" stroke-width="1.5"/>
  <text x="128" y="58" font-size="14" font-weight="700" font-family="Arial" fill="#f87171" text-anchor="middle">MISJA ZAKOŃCZONA NIEPOWODZENIEM</text>
  <text x="128" y="80" font-size="20" font-weight="600" font-family="Arial" fill="#4b5563" text-anchor="middle">Demo Shift — Rozdział 1</text>
  <!-- duży X -->
  <line x1="32" y1="40" x2="224" y2="96" stroke="#ef4444" stroke-width="3.5" stroke-linecap="round" opacity=".6"/>
  <line x1="224" y1="40" x2="32" y2="96" stroke="#ef4444" stroke-width="3.5" stroke-linecap="round" opacity=".6"/>

  <!-- strzałka w dół + "następna" -->
  <line x1="128" y1="108" x2="128" y2="148" stroke="#fb923c" stroke-width="4" stroke-linecap="round" filter="url(#glow-fn)"/>
  <polygon points="128,156 116,140 140,140" fill="#fb923c" filter="url(#glow-fn)"/>

  <!-- następna misja (dostępna) -->
  <rect x="24" y="160" width="208" height="72" rx="10" fill="#0f1d0a" stroke="#4ade80" stroke-width="2" filter="url(#glow-fn)"/>
  <text x="128" y="186" font-size="14" font-weight="700" font-family="Arial" fill="#86efac" text-anchor="middle">KONTYNUUJ — NASTĘPNA MISJA</text>
  <text x="128" y="210" font-size="20" font-weight="600" font-family="Arial" fill="#d8e0ec" text-anchor="middle">Demo Shift — Rozdział 2</text>
  <!-- zielona strzałka "play" -->
  <polygon points="200,180 218,196 200,212" fill="#4ade80" filter="url(#glow-fn)"/>
</svg>