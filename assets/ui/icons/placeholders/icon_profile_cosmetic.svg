  <rect x="22" y="96" width="84" height="8" rx="4" fill="rgba(255,255,255,0.08)"/>
  <rect x="22" y="96" width="56" height="8" rx="4" fill="#38bdf8" filter="url(#glow-pc)"/>
  <text x="64" y="116" font-size="10" font-weight="600" font-family="Arial" fill="rgba(56,189,248,0.5)" text-anchor="middle">PROFIL / KOSMETYKI</text>
