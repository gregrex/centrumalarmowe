  <defs>
    <filter id="glow-pc"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="128" height="128" rx="16" fill="#030710"/>
  <!-- karta profilu -->
  <rect x="14" y="18" width="100" height="92" rx="12" fill="#06101e" stroke="rgba(56,189,248,0.2)" stroke-width="1.5"/>
