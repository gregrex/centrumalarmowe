<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <filter id="glow-ret">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="128" height="128" rx="18" fill="#060a0e"/>
  <rect x="1.5" y="1.5" width="125" height="125" rx="17" fill="none" stroke="rgba(251,146,60,0.3)" stroke-width="1.5"/>

  <!-- ikona "przygotowanie" — tarczowy timer ze strzałką odwrócenia -->
  <!-- zewnętrzny łuk "ładowania" -->
  <circle cx="64" cy="58" r="36" fill="none" stroke="rgba(251,146,60,0.15)" stroke-width="8"/>
  <circle cx="64" cy="58" r="36" fill="none" stroke="#fb923c" stroke-width="8"
          stroke-dasharray="180 226" stroke-dashoffset="-56"
          stroke-linecap="round" filter="url(#glow-ret)" transform="rotate(-90 64 58)"/>

  <!-- ikona odwrócenia (strzałka kołowa) -->
  <path d="M64 32 C48 32 36 44 36 58" fill="none" stroke="#fbbf24" stroke-width="4" stroke-linecap="round" filter="url(#glow-ret)"/>
  <polygon points="36,58 28,50 44,46" fill="#fbbf24" filter="url(#glow-ret)"/>

  <!-- tekst RETRY -->
  <text x="64" y="65" font-size="13" font-weight="900" font-family="Arial" fill="#fbbf24" text-anchor="middle" filter="url(#glow-ret)">RETRY</text>

  <!-- dolny pasek statusu -->
  <rect x="16" y="102" width="96" height="18" rx="6" fill="rgba(251,146,60,0.1)" stroke="rgba(251,146,60,0.2)" stroke-width="1"/>
  <rect x="18" y="104" width="68" height="14" rx="5" fill="rgba(251,146,60,0.25)" filter="url(#glow-ret)"/>
  <text x="64" y="114" font-size="9" font-weight="600" font-family="Arial" fill="#fb923c" text-anchor="middle">PRZYGOTOWANIE 70%</text>
</svg>
