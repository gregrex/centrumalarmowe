<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <radialGradient id="reward-glow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="70%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#92400e" stop-opacity="0"/>
    </radialGradient>
    <filter id="reward-fx">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="4" y="4" width="120" height="120" rx="24" fill="#0c0700" stroke="#d97706" stroke-width="2"/>
  <!-- aureola promienista -->
  <circle cx="64" cy="52" r="38" fill="url(#reward-glow)" opacity=".22"/>
  <!-- trofeum — puchar -->
  <!-- nóżka -->
  <rect x="56" y="88" width="16" height="8" rx="3" fill="#b45309"/>
  <rect x="48" y="95" width="32" height="6" rx="3" fill="#92400e"/>
  <!-- korpus pucharu -->
  <path d="M40 42 C40 70 46 82 64 82 C82 82 88 70 88 42 Z" fill="#b45309"/>
  <path d="M43 42 C43 68 48 79 64 79 C80 79 85 68 85 42 Z" fill="#d97706"/>
  <!-- uchwyty boczne -->
  <path d="M40 44 C32 44 28 52 32 60 C36 68 40 68 40 68" fill="none" stroke="#b45309" stroke-width="5" stroke-linecap="round"/>
  <path d="M88 44 C96 44 100 52 96 60 C92 68 88 68 88 68" fill="none" stroke="#b45309" stroke-width="5" stroke-linecap="round"/>
  <!-- blask wewnętrzny pucharu -->
  <ellipse cx="57" cy="56" rx="7" ry="14" fill="#fde68a" opacity=".20" transform="rotate(-10 57 56)"/>
  <!-- gwiazdki na pucharu (3 małe) -->
  <polygon points="64,50 66,56 72,56 67,60 69,66 64,62 59,66 61,60 56,56 62,56" fill="#fde68a" filter="url(#reward-fx)" opacity=".9"/>
  <!-- blask górny -->
  <ellipse cx="64" cy="42" rx="14" ry="6" fill="#fef3c7" opacity=".12"/>
</svg>
