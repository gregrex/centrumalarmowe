<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <filter id="glow-hm"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="64" height="64" rx="10" fill="#020810"/>
  <!-- mapa tło -->
  <rect x="4" y="4" width="56" height="56" rx="8" fill="#03060e"/>
  <g stroke="rgba(56,189,248,0.07)" stroke-width="1">
    <line x1="4" y1="18" x2="60" y2="18"/><line x1="4" y1="32" x2="60" y2="32"/><line x1="4" y1="46" x2="60" y2="46"/>
    <line x1="18" y1="4" x2="18" y2="60"/><line x1="32" y1="4" x2="32" y2="60"/><line x1="46" y1="4" x2="46" y2="60"/>
  </g>
  <!-- heat blobs (niski-średni-wysoki) -->
  <circle cx="20" cy="44" r="10" fill="rgba(74,222,128,0.35)" filter="url(#glow-hm)"/>
  <circle cx="38" cy="38" r="13" fill="rgba(251,191,36,0.45)" filter="url(#glow-hm)"/>
  <circle cx="44" cy="22" r="9" fill="rgba(239,68,68,0.6)" filter="url(#glow-hm)"/>
  <!-- center dot krytyczny -->
  <circle cx="44" cy="22" r="3" fill="#ef4444" filter="url(#glow-hm)"/>
  <!-- legenda kolorów (mini) -->
  <rect x="5"  y="57" width="6" height="4" rx="1" fill="rgba(74,222,128,0.7)"/>
  <rect x="13" y="57" width="6" height="4" rx="1" fill="rgba(251,191,36,0.7)"/>
  <rect x="21" y="57" width="6" height="4" rx="1" fill="rgba(239,68,68,0.7)"/>
</svg>
