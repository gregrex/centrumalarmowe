<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <filter id="glow-rp">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="12" fill="#060a0e"/>
  <rect x="1" y="1" width="62" height="62" rx="11" fill="none" stroke="rgba(251,191,36,0.25)" stroke-width="1"/>

  <!-- osie wykresu -->
  <line x1="10" y1="54" x2="54" y2="54" stroke="#374151" stroke-width="2" stroke-linecap="round"/>
  <line x1="10" y1="54" x2="10" y2="10" stroke="#374151" stroke-width="2" stroke-linecap="round"/>

  <!-- linia progresji: rosnąca z kilkoma wahaniami -->
  <polyline points="10,50 18,42 26,38 30,40 38,26 46,16 54,10"
            fill="none" stroke="#fbbf24" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow-rp)"/>

  <!-- wypełnienie pod linią -->
  <polygon points="10,54 10,50 18,42 26,38 30,40 38,26 46,16 54,10 54,54"
           fill="rgba(251,191,36,0.12)"/>

  <!-- punkty na linii -->
  <circle cx="10" cy="50" r="2.5" fill="#fbbf24" filter="url(#glow-rp)"/>
  <circle cx="26" cy="38" r="2.5" fill="#fbbf24" filter="url(#glow-rp)"/>
  <circle cx="46" cy="16" r="3"   fill="#fbbf24" filter="url(#glow-rp)"/>
  <circle cx="54" cy="10" r="3.5" fill="#4ade80" filter="url(#glow-rp)"/>

  <!-- badge "▲" trend -->
  <polygon points="56,8 60,14 52,14" fill="#4ade80" filter="url(#glow-rp)"/>
</svg>
