<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96">
  <defs>
    <filter id="glow-amb">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- tło -->
  <rect x="2" y="2" width="92" height="92" rx="18" fill="#021a0a" stroke="#22c55e" stroke-width="2.5"/>
  <!-- karoseria ambulansu (box van) -->
  <rect x="8" y="38" width="64" height="28" rx="4" fill="#f1f5f9"/>
  <!-- kabina kierowcy -->
  <rect x="68" y="38" width="20" height="28" rx="4" fill="#e2e8f0"/>
  <!-- okno kabiny -->
  <rect x="70" y="42" width="10" height="10" rx="2" fill="#bfdbfe" opacity=".9"/>
  <!-- zielona belka/syren dach -->
  <rect x="10" y="34" width="62" height="6" rx="3" fill="#15803d"/>
  <rect x="12" y="35" width="15" height="4" rx="2" fill="#4ade80" filter="url(#glow-amb)"/>
  <rect x="55" y="35" width="15" height="4" rx="2" fill="#22c55e" filter="url(#glow-amb)" opacity=".8"/>
  <!-- krzyż ratunkowy (biały na tle zielonego kwadratu) -->
  <rect x="14" y="42" width="22" height="20" rx="3" fill="#16a34a"/>
  <rect x="22" y="43.5" width="6" height="17" rx="2" fill="#fff"/>
  <rect x="15.5" y="49" width="19" height="6" rx="2" fill="#fff"/>
  <!-- napis AMBULANS -->
  <text x="52" y="57" font-size="6.5" font-weight="800" font-family="Arial" fill="#1e3a8a" text-anchor="middle" letter-spacing="0.5">AMBULANS</text>
  <!-- koła -->
  <circle cx="26" cy="70" r="8" fill="#0f172a" stroke="#22c55e" stroke-width="2"/>
  <circle cx="26" cy="70" r="3.5" fill="#374151"/>
  <circle cx="64" cy="70" r="8" fill="#0f172a" stroke="#22c55e" stroke-width="2"/>
  <circle cx="64" cy="70" r="3.5" fill="#374151"/>
</svg>
