<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs><filter id="glow-td"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
  <rect width="128" height="128" rx="18" fill="#030710"/>
  <rect x="1.5" y="1.5" width="125" height="125" rx="17" fill="none" stroke="rgba(56,189,248,0.2)" stroke-width="1.5"/>
  <!-- nagłówek -->
  <rect x="10" y="10" width="108" height="20" rx="5" fill="#0d1a2d"/>
  <text x="64" y="24" font-size="10" font-weight="700" font-family="Arial" fill="#38bdf8" text-anchor="middle" letter-spacing="1">TELEMETRY</text>
  <!-- wykres słupkowy -->
  <rect x="14"  y="80" width="12" height="38" rx="2" fill="#38bdf8" opacity=".4"/>
  <rect x="30"  y="60" width="12" height="58" rx="2" fill="#38bdf8" opacity=".6"/>
  <rect x="46"  y="50" width="12" height="68" rx="2" fill="#38bdf8" filter="url(#glow-td)"/>
  <rect x="62"  y="70" width="12" height="48" rx="2" fill="#fbbf24" opacity=".6"/>
  <rect x="78"  y="42" width="12" height="76" rx="2" fill="#4ade80" filter="url(#glow-td)"/>
  <rect x="94"  y="56" width="12" height="62" rx="2" fill="#38bdf8" opacity=".5"/>
  <rect x="110" y="64" width="12" height="54" rx="2" fill="#a78bfa" opacity=".6"/>
  <!-- linia baseline -->
  <line x1="10" y1="118" x2="118" y2="118" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <!-- wartości peak -->
  <circle cx="52" cy="50" r="3" fill="#38bdf8" filter="url(#glow-td)"/>
  <circle cx="84" cy="42" r="3" fill="#4ade80" filter="url(#glow-td)"/>
  <!-- etykieta -->
  <text x="64" y="126" font-size="8" font-family="Arial" fill="rgba(56,189,248,0.4)" text-anchor="middle">SESSIONS / EVENTS</text>
