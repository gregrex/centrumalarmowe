<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs><filter id="g"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
  <rect width="128" height="128" rx="16" fill="#030710"/>
  <!-- telefon android -->
  <rect x="32" y="12" width="64" height="104" rx="12" fill="#06101e" stroke="#4ade80" stroke-width="2" filter="url(#g)"/>
  <rect x="38" y="24" width="52" height="72" rx="4" fill="#020810"/>
  <circle cx="64" cy="108" r="5" fill="#0d1a2d" stroke="#4ade80" stroke-width="1.5"/>
  <!-- build label na ekranie -->
  <rect x="42" y="30" width="44" height="14" rx="3" fill="#052e16" stroke="#4ade80" stroke-width="1"/>
  <text x="64" y="41" font-size="9" font-weight="700" font-family="Arial" fill="#4ade80" text-anchor="middle">BUILD APK</text>
  <!-- progress bar -->
  <rect x="42" y="52" width="44" height="7" rx="3" fill="rgba(255,255,255,0.08)"/>
  <rect x="42" y="52" width="38" height="7" rx="3" fill="#4ade80" filter="url(#g)"/>
  <!-- checkmark -->
  <circle cx="96" cy="16" r="14" fill="#052e16" stroke="#4ade80" stroke-width="2" filter="url(#g)"/>
  <polyline points="90,16 94,20 104,11" fill="none" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="64" y="84" font-size="10" font-weight="700" font-family="Arial" fill="#4ade80" text-anchor="middle">REAL BUILD</text>
</svg>
