<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <filter id="glow-hud">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="256" height="256" rx="24" fill="#04080f"/>
  <rect x="2" y="2" width="252" height="252" rx="23" fill="none" stroke="rgba(56,189,248,0.2)" stroke-width="1.5"/>

  <!-- górny pasek HUD -->
  <rect x="12" y="12" width="232" height="36" rx="8" fill="#0d1a2d" stroke="rgba(56,189,248,0.15)" stroke-width="1"/>
  <!-- czas -->
  <text x="128" y="35" font-size="20" font-weight="800" font-family="Arial" fill="#38bdf8" text-anchor="middle">14:22 — DYŻUR AKTYWNY</text>
  <!-- mapa mini (lewy bottom) -->
  <rect x="12" y="56" width="100" height="108" rx="8" fill="#020810" stroke="rgba(56,189,248,0.15)" stroke-width="1"/>
  <g stroke="rgba(56,189,248,0.08)" stroke-width="1">
    <line x1="12" y1="80"  x2="112" y2="80"/>
    <line x1="12" y1="104" x2="112" y2="104"/>
    <line x1="12" y1="128" x2="112" y2="128"/>
    <line x1="12" y1="152" x2="112" y2="152"/>
    <line x1="36" y1="56"  x2="36"  y2="164"/>
    <line x1="60" y1="56"  x2="60"  y2="164"/>
    <line x1="84" y1="56"  x2="84"  y2="164"/>
  </g>
  <!-- marker incydentu na mapie -->
  <circle cx="72" cy="100" r="8" fill="#7f1d1d" stroke="#ef4444" stroke-width="1.5" filter="url(#glow-hud)"/>
  <circle cx="40" cy="136" r="6" fill="#1e3a5f" stroke="#38bdf8" stroke-width="1.5" filter="url(#glow-hud)"/>

  <!-- lista incydentów (prawa kolumna) -->
  <rect x="120" y="56" width="124" height="48" rx="8" fill="#1a0505" stroke="rgba(239,68,68,0.4)" stroke-width="1.5"/>
