  <text x="136" y="93" font-size="9" font-family="Arial" fill="#64748b">ul. Żelazna 14 · P3</text>

  <rect x="120" y="110" width="124" height="48" rx="8" fill="#0d2035" stroke="rgba(56,189,248,0.3)" stroke-width="1.5"/>
