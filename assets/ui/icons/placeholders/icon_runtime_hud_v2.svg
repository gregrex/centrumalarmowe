  <text x="98" y="199" font-size="7" font-weight="700" font-family="Arial" fill="#fb923c" text-anchor="middle">DY</text>
  <text x="98" y="222" font-size="8" font-family="Arial" fill="#fb923c" text-anchor="middle">●</text>

  <rect x="128" y="180" width="48" height="56" rx="6" fill="#052e16" stroke="#4ade80" stroke-width="1"/>
