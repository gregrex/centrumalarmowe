  <text x="136" y="131" font-size="10" font-weight="700" font-family="Arial" fill="#7dd3fc">WYPADEK DROGOWY</text>
  <text x="136" y="147" font-size="9" font-family="Arial" fill="#64748b">ul. Marszałk. 88 · P2</text>

