  <text x="206" y="199" font-size="7" font-weight="700" font-family="Arial" fill="#6b7280" text-anchor="middle">CR</text>
  <text x="206" y="213" font-size="8" font-family="Arial" fill="#6b7280" text-anchor="middle">BOT</text>
  <text x="206" y="222" font-size="8" font-family="Arial" fill="#6b7280" text-anchor="middle">○</text>
