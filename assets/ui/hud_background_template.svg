<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
  <!-- HUD Background Template — mobile portrait 1080×1920 -->
  <!-- Art direction: dark operations UI, role color accent -->
  <defs>
    <!-- role accent: swap --role-color for each operator -->
    <linearGradient id="bg-main" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#03060e"/>
      <stop offset="100%" stop-color="#060b18"/>
    </linearGradient>
    <linearGradient id="sidebar-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d1a2d"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <filter id="glow-hud-bg">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-sm-bg">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.55)"/>
    </radialGradient>
  </defs>

  <!-- BASE BACKGROUND -->
  <rect width="1080" height="1920" fill="url(#bg-main)"/>

  <!-- subtle grid overlay -->
  <g stroke="rgba(56,189,248,0.04)" stroke-width="1">
    <line x1="0"    y1="240"  x2="1080" y2="240"/>
    <line x1="0"    y1="480"  x2="1080" y2="480"/>
    <line x1="0"    y1="720"  x2="1080" y2="720"/>
    <line x1="0"    y1="960"  x2="1080" y2="960"/>
    <line x1="0"    y1="1200" x2="1080" y2="1200"/>
    <line x1="0"    y1="1440" x2="1080" y2="1440"/>
    <line x1="0"    y1="1680" x2="1080" y2="1680"/>
    <line x1="270"  y1="0"    x2="270"  y2="1920"/>
    <line x1="540"  y1="0"    x2="540"  y2="1920"/>
    <line x1="810"  y1="0"    x2="810"  y2="1920"/>
  </g>

  <!-- ── TOP STATUS BAR (height 80px) ─────────────────────────── -->
  <rect x="0" y="0" width="1080" height="80" fill="rgba(13,26,45,0.95)"/>
  <rect x="0" y="78" width="1080" height="2" fill="rgba(56,189,248,0.2)"/>
  <!-- [SLOT: role name / shift timer / alert count go here] -->
  <text x="540" y="52" font-size="28" font-weight="700" font-family="Arial" fill="rgba(56,189,248,0.5)"
        text-anchor="middle" letter-spacing="4">CENTRUM ALARMOWE · HUD</text>

  <!-- ── LEFT ROLE ACCENT BAR ───────────────────────────────────── -->
  <!-- 8px wide accent bar — color driven by role -->
  <rect x="0" y="80" width="8" height="1760" fill="#38bdf8" opacity=".7" filter="url(#glow-hud-bg)"/>
  <rect x="0" y="80" width="72" height="1760" fill="url(#sidebar-grad)" opacity=".4"/>

  <!-- ── MAIN MAP AREA (placeholder zone) ──────────────────────── -->
  <rect x="80" y="100" width="920" height="860" rx="20" fill="rgba(2,8,16,0.9)"
        stroke="rgba(56,189,248,0.12)" stroke-width="1.5"/>
  <!-- [SLOT: mini-map renders here at runtime] -->
  <text x="540" y="545" font-size="24" font-family="Arial" fill="rgba(56,189,248,0.15)"
        text-anchor="middle">[MAP AREA]</text>

  <!-- ── INCIDENT QUEUE PANEL ───────────────────────────────────── -->
  <rect x="80" y="980" width="920" height="560" rx="20" fill="rgba(6,10,18,0.92)"
        stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <rect x="80" y="980" width="920" height="52" rx="20" fill="#0d1a2d"/>
  <rect x="80" y="1008" width="920" height="24" fill="#0d1a2d"/>
  <rect x="80" y="980" width="5" height="52" rx="2" fill="#38bdf8" filter="url(#glow-sm-bg)"/>
  <text x="120" y="1015" font-size="22" font-weight="700" font-family="Arial"
        fill="#38bdf8" letter-spacing="3">KOLEJKA INCYDENTÓW</text>

  <!-- incident card slot 1 (critical) -->
  <rect x="96" y="1048" width="888" height="80" rx="12" fill="rgba(127,29,29,0.35)"
        stroke="rgba(239,68,68,0.4)" stroke-width="1.5"/>
  <rect x="96" y="1048" width="6" height="80" rx="3" fill="#ef4444" filter="url(#glow-sm-bg)"/>
  <text x="120" y="1083" font-size="18" font-weight="700" font-family="Arial" fill="#fca5a5">[INC #001] Pożar Budynku · ul. Żelazna 14 · P3 KRYTYCZNY</text>
  <text x="120" y="1110" font-size="16" font-family="Arial" fill="#4b5563">PRIORTYTET: WYSOKI · Czekaj na jednostki: 🚒×2</text>

  <!-- incident card slot 2 (medium) -->
  <rect x="96" y="1140" width="888" height="80" rx="12" fill="rgba(13,26,45,0.5)"
        stroke="rgba(56,189,248,0.25)" stroke-width="1.5"/>
  <rect x="96" y="1140" width="6" height="80" rx="3" fill="#38bdf8"/>
  <text x="120" y="1175" font-size="18" font-weight="700" font-family="Arial" fill="#7dd3fc">[INC #002] Wypadek Drogowy · ul. Marszałkowska 88</text>
  <text x="120" y="1202" font-size="16" font-family="Arial" fill="#4b5563">PRIORTYTET: ŚREDNI · Czekaj na jednostki: 🚑×1</text>

  <!-- incident card slot 3 (low) -->
  <rect x="96" y="1232" width="888" height="80" rx="12" fill="rgba(255,255,255,0.03)"
        stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <rect x="96" y="1232" width="6" height="80" rx="3" fill="#4ade80"/>
  <text x="120" y="1267" font-size="18" font-weight="700" font-family="Arial" fill="#86efac">[INC #003] Zasłabnięcie · ul. Nowy Świat 12</text>
  <text x="120" y="1294" font-size="16" font-family="Arial" fill="#4b5563">PRIORTYTET: NISKI · Czekaj na jednostki: 🚑×1</text>

  <!-- ── BOTTOM ACTION BAR ─────────────────────────────────────── -->
  <rect x="0" y="1840" width="1080" height="80" fill="rgba(13,26,45,0.97)"/>
  <rect x="0" y="1840" width="1080" height="2" fill="rgba(56,189,248,0.2)"/>
  <!-- 4 action buttons -->
  <rect x="40"  y="1855" width="220" height="50" rx="12" fill="#1e3a5f" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="150" y="1885" font-size="18" font-weight="600" font-family="Arial" fill="#38bdf8" text-anchor="middle">MAPA</text>
  <rect x="290" y="1855" width="220" height="50" rx="12" fill="#431407" stroke="#fb923c" stroke-width="1.5"/>
  <text x="400" y="1885" font-size="18" font-weight="600" font-family="Arial" fill="#fb923c" text-anchor="middle">DYSPOZYCJA</text>
  <rect x="540" y="1855" width="220" height="50" rx="12" fill="#052e16" stroke="#4ade80" stroke-width="1.5"/>
  <text x="650" y="1885" font-size="18" font-weight="600" font-family="Arial" fill="#4ade80" text-anchor="middle">JEDNOSTKI</text>
  <rect x="790" y="1855" width="220" height="50" rx="12" fill="#1a0505" stroke="#f87171" stroke-width="1.5"/>
  <text x="900" y="1885" font-size="18" font-weight="600" font-family="Arial" fill="#f87171" text-anchor="middle">STATUS</text>

  <!-- VIGNETTE -->
  <rect width="1080" height="1920" fill="url(#vignette)" pointer-events="none"/>
</svg>
